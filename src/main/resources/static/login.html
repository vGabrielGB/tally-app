<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
        </head>
        <body class="login-page">

            <div class="login-card">
                <div class="login-logo" style="filter: invert(1) grayscale(0.02) contrast(1.05)" >
                    <img src="img/logo.png" alt="Logo" >
                </div>
                <h1 class="login-title">Bienvenido a TALLY</h1>

                <form id="login-form" class="login-form">
                    <div id="error-alert" class="alert" role="alert">Cédula o contraseña incorrecta.</div>

                    <div class="form-group">
                        <label for="cedula">Cédula de Identidad</label>
                        <input type="text" id="cedula" class="input" required placeholder="Ej: 12345678" />
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" class="input" required placeholder="Ingrese su contraseña"/>
                    </div>

                    <button type="submit" class="btn-primary">Iniciar Sesión</button>
                </form>
            </div>

            <script src="js/login.js"></script>
        </body>
    </html>
